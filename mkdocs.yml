site_name: Katalume Documentation
site_description: Product, engineering, API, deployment, and operations documentation for Katalume

theme:
  name: material
  logo: assets/katalume-mark.svg
  favicon: assets/katalume-mark.svg
  font:
    text: Plus Jakarta Sans
    code: Space Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra:
  generator: false

nav:
  - Home: index.md
  - Product:
      - Overview: product/overview.md
      - User journeys: product/user-journeys.md
      - Current status: product/status.md
      - Brand system: product/brand.md
  - Architecture:
      - System architecture: architecture/system.md
      - Frontend: architecture/frontend.md
      - Backend: architecture/backend.md
      - Data model: architecture/data-model.md
      - Subscription readiness: architecture/subscriptions.md
      - Decisions: architecture/decisions.md
  - User and admin guides:
      - User guide: guides/user-guide.md
      - Admin guide: guides/admin.md
      - Local development: guides/local-development.md
      - Testing: guides/testing.md
  - API:
      - Overview: api/overview.md
      - Authentication: api/authentication.md
      - Endpoint reference: api/reference.md
  - Operations:
      - Environments: operations/environments.md
      - Deployment: operations/deployment.md
      - Observability: operations/observability.md
      - Security: operations/security.md
      - Runbooks: operations/runbooks.md
      - Billing activation: operations/billing-activation.md
  - Launch:
      - Production readiness: launch/readiness.md
      - July 20 plan: launch/july-20-plan.md
  - Reference:
      - Configuration: reference/configuration.md
      - Repositories: reference/repositories.md
      - Glossary: reference/glossary.md
  - Changelog: changelog.md
